<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Finanças Família – Bruno & Priscila</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1f2937;
  --em:#10b981;--em2:#059669;--em3:#34d399;--em-dim:rgba(16, 185, 129, 0.1);
  --txt:#f0fdf4;--txt2:#9ca3af;--brd:#1f2937;
  --gold:#f59e0b;--danger:#ef4444;--radius:16px;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;-webkit-text-size-adjust:100%}
h2{font-size:1rem;font-weight:600;color:var(--em3);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
h2::before{content:'';width:4px;height:1.2em;background:var(--em);border-radius:2px}

.header{background:#0a0f1a;border-bottom:1px solid var(--brd);padding:.875rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-title{font-size:1.1rem;font-weight:700;color:var(--em)}

.btn-cfg-top {
  position: fixed; top: 12px; right: 12px; z-index: 1001;
  background: var(--bg3); border: 1px solid var(--brd); color: var(--txt);
  width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer;
}

.nav-tabs{display:flex;background:var(--bg2);padding:0 10px;border-bottom:1px solid var(--brd);overflow-x:auto;scrollbar-width:none}
.tab{flex:1;padding:1rem .5rem;text-align:center;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--em);border-bottom-color:var(--em)}

main{padding:1.25rem;max-width:1000px;margin:0 auto}
.page{display:none}.page.active{display:block}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);padding:1.25rem}
.card-label{font-size:11px;color:var(--txt2);text-transform:uppercase;margin-bottom:.5rem}
.card-val{font-size:1.2rem;font-weight:700}

.section{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}

/* Estilo dos Gráficos */
.chart-container { position: relative; height: 260px; width: 100%; }
.graficos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
.grafico-card{background:var(--bg3);border-radius:var(--radius);padding:1.5rem;border:1px solid var(--brd)}
.grafico-header{margin-bottom:1.5rem}
.grafico-titulo{font-size:13px;font-weight:600;color:var(--txt)}
.grafico-sub{font-size:11px;color:var(--txt2)}

/* Tabelas e Botões */
.btn-save,.btn-add{background:var(--em);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;font-size:11px;color:var(--txt2);text-transform:uppercase}
td{padding:12px;border-top:1px solid var(--brd)}
.btn-status{padding:6px 12px;border-radius:8px;border:none;font-weight:600;font-size:11px}
.pago{background:rgba(16,185,129,0.2);color:var(--em3)}
.pendente{background:rgba(245,158,11,0.2);color:var(--gold)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:0.3s;z-index:9999}
</style>
</head>
<body>

<button class="btn-cfg-top" onclick="showTab('config')">⚙️</button>

<div class="header">
  <div class="app-title">Família B&P</div>
  <select id="mesSelect" onchange="mudarMes(this.value)" style="background:var(--bg3);color:#fff;border:1px solid var(--brd);padding:6px;border-radius:8px"></select>
</div>

<div class="nav-tabs">
  <div class="tab active" onclick="showTab('resumo')">Resumo</div>
  <div class="tab" onclick="showTab('receitas')">Receitas</div>
  <div class="tab" onclick="showTab('despesas')">Despesas</div>
  <div class="tab" onclick="showTab('graficos')">Gráficos</div>
</div>

<main>
  <div class="page active" id="page-resumo">
    <div class="cards-grid">
      <div class="card"><div class="card-label">Receitas</div><div class="card-val" id="c_totalReceitas" style="color:var(--em)">R$ 0,00</div></div>
      <div class="card"><div class="card-label">Gasto Real</div><div class="card-val" id="c_custoReal" style="color:var(--danger)">R$ 0,00</div></div>
      <div class="card"><div class="card-label">Saldo</div><div class="card-val" id="c_saldoReal">R$ 0,00</div></div>
    </div>
  </div>

  <div class="page" id="page-receitas">
    <div class="section">
      <h2>Entradas do Mês</h2>
      <div style="display:grid;gap:10px">
        <input id="r_bruno" type="number" placeholder="Salário Bruno" step="0.01">
        <input id="r_priscila" type="number" placeholder="Salário Priscila" step="0.01">
        <button class="btn-save" onclick="salvarReceitas()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-despesas">
    <div class="section">
      <h2>Nova Despesa</h2>
      <input id="d_nome" type="text" placeholder="Ex: Aluguel">
      <input id="d_prev" type="number" placeholder="Valor Previsto">
      <input id="d_real" type="number" placeholder="Valor Real (Opcional)">
      <button class="btn-add" onclick="adicionarDespesa()">Adicionar</button>
    </div>
    <div class="section">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>Prev.</th><th>Real</th><th>Ação</th></tr></thead>
          <tbody id="despesasBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="page" id="page-graficos">
    <div class="grafico-card" style="margin-bottom:1.5rem">
        <div class="grafico-header">
            <div class="grafico-titulo">Saúde Financeira (6 Meses)</div>
            <div class="grafico-sub">Comparação entre o que entra e o que sai</div>
        </div>
        <div class="chart-container"><canvas id="chartEvolucao"></canvas></div>
    </div>

    <div class="graficos-grid">
        <div class="grafico-card">
            <div class="grafico-header">
                <div class="grafico-titulo">Planejado vs Executado</div>
                <div class="grafico-sub">Diferença por categoria de gasto</div>
            </div>
            <div class="chart-container"><canvas id="chartComparativo"></canvas></div>
        </div>
    </div>
  </div>

  <div class="page" id="page-config">
      <button class="btn-save" style="background:var(--danger)" onclick="limparDados()">Apagar Tudo</button>
  </div>
</main>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCcsY7T3DnKWJeoUaEsVjqx0e0oMV3OSj0",
  authDomain: "financas-familia-f18d5.firebaseapp.com",
  databaseURL: "https://financas-familia-f18d5-default-rtdb.firebaseio.com",
  projectId: "financas-familia-f18d5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'financas');

let allData = { meses: {} };
let mesSelecionado = new Date().toISOString().slice(0,7);
let charts = {};

function getMesDados(m){
    if(!allData.meses[m]) allData.meses[m] = { receitas:{}, despesas:[] };
    return allData.meses[m];
}

function calcTotalReceitas(m){
    const r = getMesDados(m).receitas;
    return (parseFloat(r.bruno)||0) + (parseFloat(r.priscila)||0);
}

function calcTotalReal(m){
    return (getMesDados(m).despesas||[]).reduce((s,d)=>s+(parseFloat(d.real)||0), 0);
}

function calcTotalPrevisto(m){
    return (getMesDados(m).despesas||[]).reduce((s,d)=>s+(parseFloat(d.prev)||0), 0);
}

window.showTab = (n) => {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('page-'+n).classList.add('active');
    document.querySelector(`.tab[onclick*="${n}"]`).classList.add('active');
    if(n==='graficos') setTimeout(renderGraficos, 200);
};

function renderAll(){
    const d = getMesDados(mesSelecionado);
    document.getElementById('c_totalReceitas').textContent = 'R$ '+calcTotalReceitas(mesSelecionado).toLocaleString('pt-BR');
    document.getElementById('c_custoReal').textContent = 'R$ '+calcTotalReal(mesSelecionado).toLocaleString('pt-BR');
    document.getElementById('c_saldoReal').textContent = 'R$ '+(calcTotalReceitas(mesSelecionado)-calcTotalReal(mesSelecionado)).toLocaleString('pt-BR');
    
    document.getElementById('despesasBody').innerHTML = d.despesas.map(x=>`
        <tr>
            <td>${x.nome}</td>
            <td>${parseFloat(x.prev).toLocaleString('pt-BR')}</td>
            <td>${(parseFloat(x.real)||0).toLocaleString('pt-BR')}</td>
            <td><button class="btn-status ${x.real>0?'pago':'pendente'}">${x.real>0?'Ok':'Pendente'}</button></td>
        </tr>
    `).join('');
}

function renderGraficos(){
    Object.values(charts).forEach(c => c.destroy());
    const labels6 = [];
    const dadosRec = [];
    const dadosGasto = [];

    for(let i=5; i>=0; i--){
        let date = new Date(); date.setMonth(date.getMonth()-i);
        let mKey = date.toISOString().slice(0,7);
        labels6.push(date.toLocaleDateString('pt-BR', {month:'short'}));
        dadosRec.push(calcTotalReceitas(mKey));
        dadosGasto.push(calcTotalReal(mKey));
    }

    // GRAFICO 1: EVOLUÇÃO COM GRADIENTE
    const ctxE = document.getElementById('chartEvolucao').getContext('2d');
    const grad = ctxE.createLinearGradient(0,0,0,400);
    grad.addColorStop(0, 'rgba(16, 185, 129, 0.2)');
    grad.addColorStop(1, 'rgba(16, 185, 129, 0)');

    charts.evolucao = new Chart(ctxE, {
        type: 'line',
        data: {
            labels: labels6,
            datasets: [
                { label: 'Entradas', data: dadosRec, borderColor: '#10b981', backgroundColor: grad, fill: true, tension: 0.4 },
                { label: 'Saídas', data: dadosGasto, borderColor: '#ef4444', fill: false, tension: 0.4 }
            ]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
    });

    // GRAFICO 2: PREVISTO VS REAL (BARRAS LADO A LADO)
    const ctxC = document.getElementById('chartComparativo').getContext('2d');
    charts.comparativo = new Chart(ctxC, {
        type: 'bar',
        data: {
            labels: ['Total do Mês'],
            datasets: [
                { label: 'Previsto', data: [calcTotalPrevisto(mesSelecionado)], backgroundColor: '#f59e0b' },
                { label: 'Realizado', data: [calcTotalReal(mesSelecionado)], backgroundColor: '#10b981' }
            ]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
    });
}

window.salvarReceitas = () => {
    const r = getMesDados(mesSelecionado).receitas;
    r.bruno = document.getElementById('r_bruno').value;
    r.priscila = document.getElementById('r_priscila').value;
    set(dbRef, allData);
    showToast("Salvo!");
};

window.adicionarDespesa = () => {
    const n = document.getElementById('d_nome').value;
    const p = document.getElementById('d_prev').value;
    const r = document.getElementById('d_real').value;
    if(!n || !p) return;
    getMesDados(mesSelecionado).despesas.push({ nome:n, prev:p, real:r });
    set(dbRef, allData);
    document.getElementById('d_nome').value=''; document.getElementById('d_prev').value=''; document.getElementById('d_real').value='';
};

onValue(dbRef, snap => {
    if(snap.val()) allData = snap.val();
    renderAll();
});

function showToast(m){
    const t = document.getElementById('toast');
    t.textContent = m; t.style.opacity = 1; t.style.background = '#10b981';
    setTimeout(()=>t.style.opacity=0, 2000);
}

const sel = document.getElementById('mesSelect');
for(let i=-3; i<=3; i++){
    let d = new Date(); d.setMonth(d.getMonth()+i);
    let v = d.toISOString().slice(0,7);
    sel.innerHTML += `<option value="${v}">${d.toLocaleDateString('pt-BR',{month:'short', year:'2-digit'})}</option>`;
}
sel.value = mesSelecionado;
window.mudarMes = (v) => { mesSelecionado = v; renderAll(); };
</script>
</body>
</html>
