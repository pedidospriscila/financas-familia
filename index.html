<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Finanças Família – B&P</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1f2937;
  --em:#10b981;--em2:#059669;--em3:#34d399;--em-dim:rgba(16, 185, 129, 0.1);
  --txt:#f0fdf4;--txt2:#9ca3af;--brd:#1f2937;
  --gold:#f59e0b;--danger:#ef4444;--radius:12px;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;-webkit-text-size-adjust:100%}
h2{font-size:1rem;font-weight:600;color:var(--em3);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
h2::before{content:'';width:3px;height:1em;background:var(--em);border-radius:2px}

.header{background:var(--bg);border-bottom:1px solid var(--brd);padding:.875rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-title{font-size:1.1rem;font-weight:700;color:var(--em)}
.sync-badge{font-size:10px;color:var(--txt2)}

.btn-cfg-top {
  position: fixed; top: 12px; right: 12px; z-index: 1001;
  background: var(--bg3); border: 1px solid var(--brd); color: var(--txt);
  width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer;
}

.nav-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--brd);overflow-x:auto;scrollbar-width:none}
.tab{flex:1;min-width:75px;padding:.875rem .5rem;text-align:center;font-size:11px;font-weight:600;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--em);border-bottom-color:var(--em)}

main{padding:1.25rem;max-width:1100px;margin:0 auto}
.page{display:none}.page.active{display:block}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);padding:1rem}
.card-label{font-size:10px;color:var(--txt2);text-transform:uppercase;margin-bottom:.35rem}
.card-val{font-size:1.1rem;font-weight:700}

.section{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;color:var(--txt2)}
.field input{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--txt);padding:9px;font-size:14px;outline:none}

.btn-primary{background:var(--em);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:600;cursor:pointer;width:100%}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:left;padding:10px;font-size:11px;color:var(--txt2);text-transform:uppercase}
td{padding:10px;border-top:1px solid var(--brd);font-size:13px}

.btn-status{padding:4px 8px;border-radius:15px;border:none;font-size:10px;font-weight:700;cursor:pointer}
.pago{background:var(--em-dim);color:var(--em3)}
.pendente{background:rgba(245,158,11,0.1);color:var(--gold)}

.chart-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem}
.chart-container{height:250px;position:relative}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--em);color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;opacity:0;z-index:9999;transition:0.3s}
</style>
</head>
<body>

<button class="btn-cfg-top" onclick="showTab('config')">⚙️</button>

<div class="header">
  <div class="app-title">Finanças B&P</div>
  <select id="mesSelect" onchange="mudarMes(this.value)" style="background:var(--bg3);color:#fff;border:1px solid var(--brd);padding:6px;border-radius:8px"></select>
</div>

<div class="nav-tabs">
  <div class="tab active" onclick="showTab('resumo')">📊 Resumo</div>
  <div class="tab" onclick="showTab('receitas')">💵 Receitas</div>
  <div class="tab" onclick="showTab('despesas')">📋 Despesas</div>
  <div class="tab" onclick="showTab('aquisicoes')">🎯 Metas</div>
  <div class="tab" onclick="showTab('graficos')">📈 Gráficos</div>
</div>

<main>
  <div class="page active" id="page-resumo">
    <div class="cards-grid">
      <div class="card"><div class="card-label">Receitas</div><div class="card-val" id="c_totalReceitas" style="color:var(--em)">R$ 0,00</div></div>
      <div class="card"><div class="card-label">Custo Real</div><div class="card-val" id="c_custoReal" style="color:var(--danger)">R$ 0,00</div></div>
      <div class="card"><div class="card-label">Saldo Final</div><div class="card-val" id="c_saldoReal">R$ 0,00</div></div>
    </div>
  </div>

  <div class="page" id="page-receitas">
    <div class="section">
      <h2>Entradas do Mês</h2>
      <div class="form-grid">
        <div class="field"><label>Salário Bruno</label><input id="r_salarioBruno" type="number" step="0.01"></div>
        <div class="field"><label>Salário Priscila</label><input id="r_salarioPriscila" type="number" step="0.01"></div>
        <div class="field"><label>Extra Bruno</label><input id="r_rendaExtraBruno" type="number" step="0.01"></div>
        <div class="field"><label>Extra Priscila</label><input id="r_rendaExtraPriscila" type="number" step="0.01"></div>
        <div class="field"><label>13º Salário</label><input id="r_decimoTerceiro" type="number" step="0.01"></div>
      </div>
      <button class="btn-primary" onclick="salvarReceitas()">✓ Salvar Receitas</button>
    </div>
  </div>

  <div class="page" id="page-despesas">
    <div class="section">
      <h2>Lançar Despesa</h2>
      <div class="form-grid">
        <div class="field"><label>Descrição</label><input id="d_nome" type="text"></div>
        <div class="field"><label>Vencimento (Dia)</label><input id="d_vencimento" type="number"></div>
        <div class="field"><label>Valor Previsto</label><input id="d_custoPrevisto" type="number" step="0.01"></div>
        <div class="field"><label>Valor Real (Pago)</label><input id="d_custoReal" type="number" step="0.01"></div>
      </div>
      <button class="btn-primary" onclick="adicionarDespesa()">+ Adicionar na Lista</button>
    </div>
    <div class="section">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>Dia</th><th>Previsto</th><th>Real</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody id="despesasBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="page" id="page-aquisicoes">
    <div class="section">
        <h2>Metas / Sonhos</h2>
        <div class="form-grid">
            <input id="a_nome" type="text" placeholder="Item">
            <input id="a_valor" type="number" placeholder="Valor Estimado">
            <button class="btn-primary" onclick="adicionarMeta()">Salvar</button>
        </div>
    </div>
    <div class="cards-grid" id="metasList"></div>
  </div>

  <div class="page" id="page-graficos">
    <div class="chart-card">
        <h2>📊 Tendência Mensal</h2>
        <div class="chart-container"><canvas id="chartEvolucao"></canvas></div>
    </div>
    <div class="chart-card">
        <h2>💰 Planejado vs Real (Mês Atual)</h2>
        <div class="chart-container"><canvas id="chartComparativo"></canvas></div>
    </div>
  </div>

  <div class="page" id="page-config">
    <div class="section">
        <button class="btn-primary" style="background:var(--danger)" onclick="limparTudo()">Apagar Dados Firebase</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCcsY7T3DnKWJeoUaEsVjqx0e0oMV3OSj0",
  authDomain: "financas-familia-f18d5.firebaseapp.com",
  databaseURL: "https://financas-familia-f18d5-default-rtdb.firebaseio.com",
  projectId: "financas-familia-f18d5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'financas');

let allData = { meses: {} };
let mesSelecionado = new Date().toISOString().slice(0,7);
let charts = {};

// FUNÇÃO CHAVE: Garante que todas as categorias existam sem apagar as outras
function getMes(m){ 
    if(!allData.meses) allData.meses = {};
    if(!allData.meses[m]) allData.meses[m] = {};
    if(!allData.meses[m].receitas) allData.meses[m].receitas = {};
    if(!allData.meses[m].despesas) allData.meses[m].despesas = [];
    if(!allData.meses[m].aquisicoes) allData.meses[m].aquisicoes = [];
    return allData.meses[m]; 
}

function totalRec(m){
    const r = getMes(m).receitas;
    return (parseFloat(r.salarioBruno)||0)+(parseFloat(r.salarioPriscila)||0)+(parseFloat(r.rendaExtraBruno)||0)+(parseFloat(r.rendaExtraPriscila)||0)+(parseFloat(r.decimoTerceiro)||0);
}
function totalReal(m){ return (getMes(m).despesas||[]).filter(d=>d.pago).reduce((s,d)=>s+(parseFloat(d.custoReal||d.custoPrevisto)||0),0); }
function totalPrev(m){ return (getMes(m).despesas||[]).reduce((s,d)=>s+(parseFloat(d.custoPrevisto)||0),0); }

window.showTab = (n) => {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('page-'+n).classList.add('active');
    document.querySelector(`.tab[onclick*="${n}"]`)?.classList.add('active');
    if(n==='graficos') setTimeout(renderGraficos, 200);
};

function render(){
    const d = getMes(mesSelecionado);
    document.getElementById('c_totalReceitas').textContent = 'R$ '+totalRec(mesSelecionado).toLocaleString('pt-BR');
    document.getElementById('c_custoReal').textContent = 'R$ '+totalReal(mesSelecionado).toLocaleString('pt-BR');
    document.getElementById('c_saldoReal').textContent = 'R$ '+(totalRec(mesSelecionado)-totalReal(mesSelecionado)).toLocaleString('pt-BR');

    document.getElementById('r_salarioBruno').value = d.receitas.salarioBruno || '';
    document.getElementById('r_salarioPriscila').value = d.receitas.salarioPriscila || '';
    document.getElementById('r_rendaExtraBruno').value = d.receitas.rendaExtraBruno || '';
    document.getElementById('r_rendaExtraPriscila').value = d.receitas.rendaExtraPriscila || '';
    document.getElementById('r_decimoTerceiro').value = d.receitas.decimoTerceiro || '';

    document.getElementById('despesasBody').innerHTML = (d.despesas||[]).map((x,i)=>`
        <tr>
            <td>${x.nome}</td>
            <td>${x.vencimento||'-'}</td>
            <td>${parseFloat(x.custoPrevisto||0).toLocaleString('pt-BR')}</td>
            <td>${parseFloat(x.custoReal||0).toLocaleString('pt-BR')}</td>
            <td><button class="btn-status ${x.pago?'pago':'pendente'}" onclick="togglePago(${i})">${x.pago?'PAGO':'PENDENTE'}</button></td>
            <td><button style="color:red; background:none; border:none" onclick="removerDesp(${i})">✕</button></td>
        </tr>
    `).join('');

    document.getElementById('metasList').innerHTML = (d.aquisicoes||[]).map((m,i)=>`
        <div class="card">
            <div class="card-label">${m.nome}</div>
            <div class="card-val" style="color:var(--gold)">R$ ${parseFloat(m.valor||0).toLocaleString('pt-BR')}</div>
            <button onclick="removerMeta(${i})" style="font-size:10px; color:var(--txt2); margin-top:5px; border:none; background:none">✕ Remover</button>
        </div>
    `).join('');
}

function renderGraficos(){
    Object.values(charts).forEach(c=>c.destroy());
    const ultimos = [];
    for(let i=5; i>=0; i--){
        let date = new Date(mesSelecionado + "-01");
        date.setMonth(date.getMonth()-i);
        ultimos.push(date.toISOString().slice(0,7));
    }
    const ctxE = document.getElementById('chartEvolucao').getContext('2d');
    charts.ev = new Chart(ctxE, {
        type:'line',
        data: {
            labels: ultimos.map(m=>m.split('-')[1]+'/'+m.split('-')[0].slice(2)),
            datasets: [
                { label: 'Receitas', data: ultimos.map(m=>totalRec(m)), borderColor: '#10b981', tension: 0.4 },
                { label: 'Gasto Real', data: ultimos.map(m=>totalReal(m)), borderColor: '#ef4444', tension: 0.4 }
            ]
        },
        options: { maintainAspectRatio: false }
    });
    const ctxC = document.getElementById('chartComparativo').getContext('2d');
    charts.comp = new Chart(ctxC, {
        type:'bar',
        data: {
            labels: ['Planejado', 'Realizado'],
            datasets: [{ data: [totalPrev(mesSelecionado), totalReal(mesSelecionado)], backgroundColor: ['#f59e0b', '#10b981'] }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

window.salvarReceitas = () => {
    const d = getMes(mesSelecionado);
    d.receitas.salarioBruno = document.getElementById('r_salarioBruno').value;
    d.receitas.salarioPriscila = document.getElementById('r_salarioPriscila').value;
    d.receitas.rendaExtraBruno = document.getElementById('r_rendaExtraBruno').value;
    d.receitas.rendaExtraPriscila = document.getElementById('r_rendaExtraPriscila').value;
    d.receitas.decimoTerceiro = document.getElementById('r_decimoTerceiro').value;
    save(); toast("Salvo!");
};

window.adicionarDespesa = () => {
    const d = getMes(mesSelecionado);
    const n = document.getElementById('d_nome').value, p = document.getElementById('d_custoPrevisto').value;
    if(!n||!p) return;
    d.despesas.push({ 
        nome:n, custoPrevisto:p, 
        vencimento:document.getElementById('d_vencimento').value, 
        custoReal:document.getElementById('d_custoReal').value,
        pago: parseFloat(document.getElementById('d_custoReal').value) > 0
    });
    save(); 
    document.getElementById('d_nome').value=''; document.getElementById('d_custoPrevisto').value='';
};

window.adicionarMeta = () => {
    const d = getMes(mesSelecionado);
    const n = document.getElementById('a_nome').value, v = document.getElementById('a_valor').value;
    if(!n||!v) return;
    d.aquisicoes.push({ nome:n, valor:v });
    save();
    document.getElementById('a_nome').value=''; document.getElementById('a_valor').value='';
};

window.togglePago = (i) => {
    const d = getMes(mesSelecionado).despesas[i];
    d.pago = !d.pago;
    if(d.pago && !d.custoReal) d.custoReal = d.custoPrevisto;
    save();
};
window.removerDesp = (i) => { getMes(mesSelecionado).despesas.splice(i,1); save(); };
window.removerMeta = (i) => { getMes(mesSelecionado).aquisicoes.splice(i,1); save(); };

function save(){ set(dbRef, allData); }
onValue(dbRef, snap => { if(snap.val()) allData = snap.val(); render(); });
window.mudarMes = (v) => { mesSelecionado = v; render(); };
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }

const sel = document.getElementById('mesSelect');
for(let i=-6; i<=6; i++){
    let d = new Date(); d.setMonth(d.getMonth()+i);
    let v = d.toISOString().slice(0,7);
    sel.innerHTML += `<option value="${v}">${d.toLocaleDateString('pt-BR',{month:'short', year:'2-digit'})}</option>`;
}
sel.value = mesSelecionado;
</script>
</body>
</html>
